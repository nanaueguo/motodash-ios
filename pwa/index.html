<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050607" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MotoDash" />
    <title>MotoDash</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css?v=13" />
  </head>
  <body>
    <main class="shell" aria-label="MotoDash 骑行仪表盘">
      <section class="dash">
        <header class="dash-header">
          <div>
            <p class="eyebrow">MotoDash</p>
            <h1>RIDE</h1>
          </div>
          <time id="clock" class="clock">--:--</time>
        </header>

        <section class="cockpit">
          <section class="speed-card" aria-labelledby="speedLabel">
            <div class="card-label" id="speedLabel">速度</div>
            <div class="speedometer" aria-hidden="true">
              <svg class="speed-svg" viewBox="0 0 520 340" role="img">
                <path class="track" d="M70 288A205 205 0 0 1 450 288" />
                <path class="track-glow" d="M70 288A205 205 0 0 1 450 288" />
                <g class="ticks">
                  <line x1="82" y1="288" x2="109" y2="288" />
                  <line x1="114" y1="178" x2="138" y2="191" />
                  <line x1="204" y1="96" x2="212" y2="122" />
                  <line x1="316" y1="96" x2="308" y2="122" />
                  <line x1="406" y1="178" x2="382" y2="191" />
                  <line x1="438" y1="288" x2="411" y2="288" />
                </g>
                <g class="tick-labels">
                  <text x="77" y="322">0</text>
                  <text x="93" y="162">40</text>
                  <text x="192" y="78">80</text>
                  <text x="303" y="78">120</text>
                  <text x="395" y="162">160</text>
                  <text x="418" y="322">180</text>
                </g>
                <g class="svg-needle" id="speedNeedle" transform="rotate(0 260 288)">
                  <line x1="260" y1="288" x2="95" y2="288" />
                </g>
                <circle class="svg-hub" cx="260" cy="288" r="18" />
              </svg>
              <div class="speed-value">
                <span id="speed">0</span>
                <small>km/h</small>
              </div>
            </div>
            <button class="start-button" id="startButton" type="button">开始</button>
          </section>

          <aside class="side-stack">
            <section class="lean-card" aria-labelledby="leanLabel">
              <div class="card-label" id="leanLabel">倾角</div>
              <div class="lean-meter">
                <svg class="lean-svg" viewBox="0 0 280 170" aria-hidden="true">
                  <path class="lean-track" d="M42 132A105 105 0 0 1 238 132" />
                  <path class="lean-midline" d="M140 44V66" />
                  <text x="34" y="157">L</text>
                  <text x="134" y="34">0</text>
                  <text x="232" y="157">R</text>
                </svg>
                <div class="moto-pointer" id="leanPointer" aria-hidden="true">
                  <svg viewBox="0 0 150 150">
                    <path class="mirror left" d="M57 49L24 31l-13 6 31 25" />
                    <path class="mirror right" d="M93 49l33-18 13 6-31 25" />
                    <path class="tail-body" d="M45 58L58 30h34l13 28-17 26H62z" />
                    <path class="seat" d="M58 30h34l-7-13H65z" />
                    <path class="tail-light left" d="M50 61h19" />
                    <path class="tail-light right" d="M81 61h19" />
                    <path class="tire" d="M57 82c0-19 8-31 18-31s18 12 18 31v35c0 18-8 27-18 27s-18-9-18-27z" />
                    <path class="tire-groove" d="M75 58v82" />
                    <path class="side-fin left" d="M46 86l-27 20M46 98l-27 20M46 110l-24 18" />
                    <path class="side-fin right" d="M104 86l27 20M104 98l27 20M104 110l24 18" />
                  </svg>
                </div>
                <div class="lean-readout">
                  <span id="lean">0</span><small>deg</small>
                </div>
              </div>
              <button class="calibrate-button" id="calibrateButton" type="button">校准</button>
            </section>

            <section class="info-row" aria-label="骑行信息">
              <article class="info-card">
                <span>时间</span>
                <strong id="infoTime">--:--</strong>
              </article>
              <article class="info-card">
                <span>海拔</span>
                <strong><span id="altitude">--</span><small>m</small></strong>
              </article>
            </section>
          </aside>
        </section>
      </section>

      <section class="portrait-guard" aria-label="横屏提示">
        <div class="phone-icon"></div>
        <strong>请横屏使用</strong>
        <span>把 iPhone 固定到车把后再点击校准。</span>
      </section>
    </main>

    <script src="./app.js?v=13" type="module"></script>
  </body>
</html>
